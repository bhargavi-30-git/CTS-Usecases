# ═══════════════════════════════════════════════════
# CI/CD PIPELINE — Deploy Web App to Azure VM
# Terraform runs MANUALLY from Cloud Shell
# This pipeline ONLY deploys the web app
# ═══════════════════════════════════════════════════

trigger:
  branches:
    include:
      - main

pool:
  name: Default
  demands:
    - agent.name -equals uc5-auto-vm

variables:
  artifactName: 'WebAppDrop'

steps:

  # Step 1 — Verify app folder
  - script: |
      echo '--- Repo contents ---'
      ls -la
      echo '--- app/ folder ---'
      ls -la app/
    displayName: 'Verify app folder structure'

  # Step 2 — Archive app folder into ZIP
  - task: ArchiveFiles@2
    inputs:
      rootFolderOrFile: '$(Build.SourcesDirectory)/app'
      includeRootFolder: false
      archiveType: 'zip'
      archiveFile: '$(Build.ArtifactStagingDirectory)/WebApp.zip'
      replaceExistingArchive: true
    displayName: 'Archive app/ into WebApp.zip'

  # Step 3 — Publish artifact for CD pipeline
  - task: PublishBuildArtifacts@1
    inputs:
      PathtoPublish: '$(Build.ArtifactStagingDirectory)'
      ArtifactName: '$(artifactName)'
      publishLocation: 'Container'
    displayName: 'Publish artifact: WebAppDrop'